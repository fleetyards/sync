name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: "Create a major release (otherwise auto-detected: feat→minor, fix→patch)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          if [ "${{ inputs.major }}" = "true" ]; then
            BUMP="major"
          else
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$PREVIOUS_TAG" ]; then
              HAS_FEAT=$(git log "${PREVIOUS_TAG}..HEAD" --format="%s" --no-merges | grep -cE '^feat(\(|:|[[:space:]])' || true)
            else
              HAS_FEAT=$(git log --format="%s" --no-merges | grep -cE '^feat(\(|:|[[:space:]])' || true)
            fi

            if [ "$HAS_FEAT" -gt 0 ]; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            BODY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CHANGELOG.md
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            ENTRY=$(bash .github/scripts/generate-changelog.sh "$PREVIOUS_TAG" "$NEW_TAG")

            {
              head -3 CHANGELOG.md
              echo ""
              echo "$ENTRY"
              tail -n +4 CHANGELOG.md
            } > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Update package.json
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          jq ".version = \"${NEW_VERSION}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit and tag
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"

          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${NEW_TAG}"
          git tag "${NEW_TAG}" -m "Release ${NEW_TAG}"

      - name: Push changes
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"

          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --notes "${{ steps.changelog.outputs.body }}"
